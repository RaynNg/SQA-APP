<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQA Quiz</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background: #f4f6fb;
        color: #222;
        min-height: 100vh;
      }

      #app {
        max-width: 740px;
        margin: 0 auto;
        padding: 24px 16px;
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 6px;
        color: #3b2fa0;
      }
      .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 20px;
      }

      .screen {
        display: none;
      }
      .screen.active {
        display: block;
      }

      /* Chapter grid */
      .section-label {
        font-size: 11px;
        font-weight: 700;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }
      .chapter-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }
      .chapter-card {
        background: #fff;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        padding: 14px 16px;
        cursor: pointer;
        transition: 0.15s;
      }
      .chapter-card:hover {
        border-color: #9b8fe8;
        background: #f3f1ff;
      }
      .chapter-card.selected {
        border-color: #6c5ce7;
        background: #f0eeff;
      }
      .ch-num {
        font-size: 11px;
        color: #888;
        font-weight: 700;
        margin-bottom: 3px;
      }
      .ch-title {
        font-size: 13px;
        font-weight: 600;
        color: #333;
        line-height: 1.4;
      }
      .ch-count {
        font-size: 12px;
        color: #aaa;
        margin-top: 4px;
      }

      /* Controls */
      .controls-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      label {
        font-size: 13px;
        color: #555;
      }
      select {
        font-size: 13px;
        padding: 7px 12px;
        border: 1.5px solid #ddd;
        border-radius: 8px;
        background: #fff;
        color: #333;
        cursor: pointer;
      }
      select:focus {
        outline: none;
        border-color: #6c5ce7;
      }

      .btn-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        cursor: pointer;
        font-size: 14px;
        border-radius: 8px;
        padding: 9px 20px;
        border: none;
        transition: 0.15s;
        font-family: inherit;
      }
      .btn-primary {
        background: #6c5ce7;
        color: #fff;
        font-weight: 600;
      }
      .btn-primary:hover {
        background: #5548c8;
      }
      .btn-primary:disabled {
        background: #bbb;
        cursor: not-allowed;
      }
      .btn-outline {
        background: #fff;
        color: #444;
        border: 1.5px solid #ddd;
      }
      .btn-outline:hover {
        background: #f5f5f5;
        border-color: #bbb;
      }

      /* Quiz screen */
      .quiz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .q-meta {
        font-size: 13px;
        color: #666;
      }
      .q-chapter-tag {
        font-size: 12px;
        background: #f0eeff;
        color: #6c5ce7;
        border-radius: 99px;
        padding: 3px 10px;
        font-weight: 600;
      }
      .progress-wrap {
        background: #e8e8e8;
        border-radius: 99px;
        height: 7px;
        margin-bottom: 20px;
      }
      .progress-fill {
        height: 7px;
        border-radius: 99px;
        background: #6c5ce7;
        transition: width 0.3s;
      }
      .question-text {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.6;
        color: #222;
        margin-bottom: 18px;
        background: #fff;
        border-radius: 10px;
        padding: 18px 20px;
        border: 1.5px solid #e8e8e8;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .option-btn {
        background: #fff;
        border: 1.5px solid #e0e0e0;
        border-radius: 9px;
        padding: 12px 16px;
        font-size: 14px;
        color: #333;
        text-align: left;
        display: flex;
        align-items: flex-start;
        gap: 10px;
        line-height: 1.5;
        transition: 0.15s;
        width: 100%;
      }
      .option-btn:hover:not(:disabled) {
        border-color: #9b8fe8;
        background: #f5f3ff;
      }
      .option-btn.selected {
        border-color: #6c5ce7;
        background: #f0eeff;
      }
      .option-btn .letter {
        font-weight: 700;
        color: #888;
        min-width: 20px;
      }
      .option-btn.correct {
        border-color: #00b894;
        background: #eafaf5;
      }
      .option-btn.correct .letter {
        color: #00875a;
      }
      .option-btn.wrong {
        border-color: #e17055;
        background: #fff3f0;
      }
      .option-btn.wrong .letter {
        color: #c0392b;
      }
      .option-btn:disabled {
        cursor: default;
      }

      .feedback {
        margin-top: 14px;
        padding: 12px 16px;
        border-radius: 9px;
        font-size: 14px;
        line-height: 1.5;
      }
      .feedback.correct {
        background: #eafaf5;
        color: #007a55;
        border: 1.5px solid #55d8b0;
      }
      .feedback.wrong {
        background: #fff3f0;
        color: #c0392b;
        border: 1.5px solid #f0997b;
      }

      .quiz-nav {
        display: flex;
        justify-content: space-between;
        margin-top: 18px;
        align-items: center;
      }

      /* Result screen */
      .result-center {
        text-align: center;
        padding: 20px 0 10px;
      }
      .score-ring {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 5px solid #6c5ce7;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        background: #f0eeff;
      }
      .score-big {
        font-size: 30px;
        font-weight: 700;
        color: #6c5ce7;
      }
      .score-lbl {
        font-size: 12px;
        color: #888;
      }
      .result-msg {
        font-size: 15px;
        color: #555;
        margin-bottom: 20px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: #fff;
        border-radius: 10px;
        padding: 14px;
        text-align: center;
        border: 1.5px solid #e8e8e8;
      }
      .stat-val {
        font-size: 26px;
        font-weight: 700;
      }
      .stat-lbl {
        font-size: 12px;
        color: #888;
        margin-top: 2px;
      }
      .green {
        color: #00b894;
      }
      .red {
        color: #e17055;
      }
      .purple {
        color: #6c5ce7;
      }

      /* Review */
      .review-item {
        background: #fff;
        border: 1.5px solid #e8e8e8;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 10px;
      }
      .review-q {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
        line-height: 1.5;
      }
      .review-ans {
        font-size: 13px;
        padding: 5px 12px;
        border-radius: 7px;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 4px;
        line-height: 1.5;
      }
      .review-ans.correct {
        background: #eafaf5;
        color: #007a55;
      }
      .review-ans.wrong {
        background: #fff3f0;
        color: #c0392b;
      }
      .review-ans.neutral {
        color: #777;
      }
      .review-tag {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        color: #6c5ce7;
        background: #f0eeff;
        border-radius: 99px;
        padding: 2px 10px;
        margin-bottom: 8px;
      }
      .question-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .question-card {
        background: #fff;
        border: 1.5px solid #e8e8e8;
        border-radius: 10px;
        padding: 14px;
      }
      .question-card .question-text {
        margin-bottom: 10px;
        background: transparent;
        border: none;
        padding: 0;
        border-radius: 0;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- HOME -->
      <div id="home-screen" class="screen active">
        <h1>SQA Quiz</h1>
        <p class="subtitle">
          Chọn chương muốn ôn tập, số câu hỏi rồi bấm Bắt đầu.
        </p>

        <div class="section-label">Chọn chương</div>
        <div class="chapter-grid" id="chapter-grid"></div>

        <div class="controls-row">
          <label>Số câu:</label>
          <select id="q-count">
            <option value="10">10 câu</option>
            <option value="20" selected>20 câu</option>
            <option value="40">40 câu</option>
            <option value="80">Tất cả (80 câu)</option>
          </select>
        </div>

        <div class="btn-row">
          <button class="btn-primary" onclick="startQuiz()">Bắt đầu thi</button>
          <button class="btn-outline" onclick="selectAll()">Chọn tất cả</button>
          <button class="btn-outline" onclick="clearAll()">Bỏ chọn</button>
        </div>
      </div>

      <!-- QUIZ -->
      <div id="quiz-screen" class="screen">
        <div class="quiz-header">
          <span class="q-meta" id="q-meta"></span>
          <span class="q-chapter-tag" id="q-chapter-tag"></span>
        </div>
        <div class="progress-wrap">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="question-list" id="questions-list"></div>
        <div class="quiz-nav">
          <button class="btn-outline" onclick="exitQuiz()">
            &#8592; Thoát
          </button>
          <button class="btn-primary" id="submit-btn" onclick="submitQuiz()">
            Nộp bài
          </button>
        </div>
      </div>

      <!-- RESULT -->
      <div id="result-screen" class="screen">
        <div class="result-center">
          <div class="score-ring">
            <span class="score-big" id="score-pct">0%</span>
            <span class="score-lbl">Điểm</span>
          </div>
          <p class="result-msg" id="result-msg"></p>
        </div>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-val green" id="s-correct">0</div>
            <div class="stat-lbl">Đúng</div>
          </div>
          <div class="stat-card">
            <div class="stat-val red" id="s-wrong">0</div>
            <div class="stat-lbl">Sai</div>
          </div>
          <div class="stat-card">
            <div class="stat-val purple" id="s-total">0</div>
            <div class="stat-lbl">Tổng câu</div>
          </div>
        </div>
        <div class="btn-row" style="margin-bottom: 24px">
          <button class="btn-primary" onclick="restartSame()">Thi lại</button>
          <button class="btn-outline" onclick="showHome()">
            Chọn chương khác
          </button>
          <button class="btn-outline" onclick="toggleReview()">
            Xem đáp án
          </button>
        </div>
        <div id="review-area" style="display: none">
          <div class="section-label" style="margin-bottom: 12px">
            Xem lại câu hỏi
          </div>
          <div id="review-list"></div>
        </div>
      </div>
    </div>

    <script>

      const CHAPTERS = [
        { id: 1, title: "Introduction of SQA" },
        { id: 2, title: "Integrating Quality in SDLC" },
        { id: 3, title: "Reviews" },
        { id: 4, title: "Software Testing" },
      ];

      let selectedChapters = new Set([1, 2, 3, 4]);
      let quizQuestions = [],
        results = [],
        userAnswers = [];

      function renderChapterGrid() {
        document.getElementById("chapter-grid").innerHTML = CHAPTERS.map(
          (c) => {
            const count = QUESTIONS.filter((q) => q.ch === c.id).length;
            return `<div class="chapter-card ${selectedChapters.has(c.id) ? "selected" : ""}" onclick="toggleChapter(${c.id})">
      <div class="ch-num">Chương ${c.id}</div>
      <div class="ch-title">${c.title}</div>
      <div class="ch-count">${count} câu hỏi</div>
    </div>`;
          },
        ).join("");
      }

      function toggleChapter(id) {
        selectedChapters.has(id)
          ? selectedChapters.delete(id)
          : selectedChapters.add(id);
        renderChapterGrid();
      }
      function selectAll() {
        CHAPTERS.forEach((c) => selectedChapters.add(c.id));
        renderChapterGrid();
      }
      function clearAll() {
        selectedChapters.clear();
        renderChapterGrid();
      }

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function startQuiz() {
        if (!selectedChapters.size) {
          alert("Vui lòng chọn ít nhất một chương!");
          return;
        }
        const pool = QUESTIONS.filter((q) => selectedChapters.has(q.ch));
        const count = Math.min(
          parseInt(document.getElementById("q-count").value),
          pool.length,
        );
        quizQuestions = shuffle(pool).slice(0, count);
        results = [];
        userAnswers = new Array(quizQuestions.length).fill(null);
        showScreen("quiz-screen");
        renderAllQuestions();
      }

      function renderAllQuestions() {
        const total = quizQuestions.length;
        const chapterCount = selectedChapters.size;
        document.getElementById("q-meta").textContent = `Tổng ${total} câu`;
        document.getElementById("q-chapter-tag").textContent =
          `${chapterCount} chương`;
        document.getElementById("progress-fill").style.width = "100%";

        const letters = ["A", "B", "C", "D"];
        document.getElementById("questions-list").innerHTML = quizQuestions
          .map(
            (q, qi) =>
              `<div class="question-card">
      <div class="review-tag">${q.chTitle}</div>
      <div class="question-text">${qi + 1}. ${q.q}</div>
      <div class="options">
        ${q.opts
          .map(
            (opt, oi) =>
              `<button class="option-btn ${userAnswers[qi] === oi ? "selected" : ""}" onclick="selectAnswer(${qi}, ${oi})"><span class="letter">${letters[oi]}</span><span>${opt}</span></button>`,
          )
          .join("")}
      </div>
    </div>`,
          )
          .join("");

        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function selectAnswer(questionIdx, optionIdx) {
        userAnswers[questionIdx] = optionIdx;
        renderAllQuestions();
      }

      function submitQuiz() {
        const unanswered = userAnswers.filter((a) => a === null).length;
        if (unanswered > 0) {
          const ok = confirm(
            `Bạn còn ${unanswered} câu chưa trả lời. Vẫn nộp bài?`,
          );
          if (!ok) return;
        }
        results = quizQuestions.map((q, i) => userAnswers[i] === q.ans);
        showResults();
      }

      function showResults() {
        showScreen("result-screen");
        const correct = results.filter(Boolean).length;
        const total = results.length;
        const pct = Math.round((correct / total) * 100);
        document.getElementById("score-pct").textContent = pct + "%";
        document.getElementById("s-correct").textContent = correct;
        document.getElementById("s-wrong").textContent = total - correct;
        document.getElementById("s-total").textContent = total;
        document.getElementById("result-msg").textContent =
          pct >= 80
            ? "🎉 Xuất sắc! Bạn nắm vững kiến thức."
            : pct >= 60
              ? "👍 Khá tốt! Hãy ôn thêm các câu sai."
              : "📖 Cần ôn tập thêm. Cố lên!";
        document.getElementById("review-area").style.display = "none";
      }

      function toggleReview() {
        const area = document.getElementById("review-area");
        if (area.style.display !== "none") {
          area.style.display = "none";
          return;
        }
        area.style.display = "block";
        const letters = ["A", "B", "C", "D"];
        document.getElementById("review-list").innerHTML = quizQuestions
          .map((q, i) => {
            const ua = userAnswers[i];
            return `<div class="review-item">
      <div class="review-tag">${q.chTitle}</div>
      <div class="review-q">${i + 1}. ${q.q}</div>
      ${q.opts
        .map((opt, oi) => {
          let cls = "neutral";
          if (oi === q.ans) cls = "correct";
          else if (oi === ua && ua !== q.ans) cls = "wrong";
          return `<div class="review-ans ${cls}"><strong>${letters[oi]}.</strong> ${opt}</div>`;
        })
        .join("")}
    </div>`;
          })
          .join("");
        area.scrollIntoView({ behavior: "smooth" });
      }

      function restartSame() {
        quizQuestions = shuffle(quizQuestions);
        results = [];
        userAnswers = new Array(quizQuestions.length).fill(null);
        showScreen("quiz-screen");
        renderAllQuestions();
      }
      function exitQuiz() {
        showHome();
      }
      function showHome() {
        showScreen("home-screen");
        renderChapterGrid();
      }
      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      renderChapterGrid();
